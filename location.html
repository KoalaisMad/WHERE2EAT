<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHERE2EAT</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #f5f1eb 0%, #ede7dd 100%);
            min-height: 100vh;
            color: #3a3330;
            overflow-x: hidden;
            padding: 0;
            margin: 0;
        }

        /* Desktop-friendly container */
        .desktop-container {
            max-width: 1200px;
            margin: 0 auto;
            min-height: 100vh;
            background: #f5f1eb;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }



        /* Splash screen */
        .splash-screen {
            padding: 80px 60px;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
        }

        .app-title {
            font-family: 'Crimson Text', serif;
            font-size: 4.5rem;
            font-weight: 400;
            font-style: italic;
            color: #3a3330;
            margin: 40px 0 20px;
            line-height: 1.2;
            letter-spacing: -1px;
        }

        .app-subtitle {
            font-size: 18px;
            color: #8b7b6b;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 80px;
            text-transform: uppercase;
        }

        .get-started-btn {
            background: #8b7b6b;
            color: #f5f1eb;
            border: none;
            padding: 20px 60px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .get-started-btn:hover {
            background: #756659;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(139, 123, 107, 0.3);
        }

        /* Main form screen */
        .main-screen {
            display: none;
            padding: 60px;
            min-height: 100vh;
            max-width: 1000px;
            margin: 0 auto;
        }

        .screen-header {
            padding: 0 0 40px;
            border-bottom: 1px solid rgba(139, 123, 107, 0.2);
            margin-bottom: 50px;
            text-align: center;
        }

        .screen-title {
            font-family: 'Crimson Text', serif;
            font-size: 2.5rem;
            color: #3a3330;
            margin-bottom: 15px;
        }

        .screen-subtitle {
            font-size: 16px;
            color: #8b7b6b;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* Form cards in grid layout */
        .form-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin-bottom: 40px;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(139, 123, 107, 0.15);
            border-radius: 20px;
            padding: 30px;
            transition: all 0.3s ease;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-card:hover {
            background: rgba(255, 255, 255, 0.8);
            border-color: rgba(139, 123, 107, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .form-card.active {
            background: rgba(255, 255, 255, 0.9);
            border-color: #8b7b6b;
            transform: translateY(-2px);
        }

        .form-label {
            font-size: 18px;
            font-weight: 500;
            color: #3a3330;
            margin-bottom: 15px;
            display: block;
        }

        .form-input select, .form-input input {
            width: 100%;
            padding: 15px 20px;
            border: 1px solid rgba(139, 123, 107, 0.2);
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            background: rgba(255, 255, 255, 0.7);
            color: #3a3330;
            appearance: none;
            transition: all 0.3s ease;
        }

        .form-input select:focus, .form-input input:focus {
            outline: none;
            border-color: #8b7b6b;
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-1px);
        }

        .form-input input::placeholder {
            color: #a69688;
        }

        /* Location section */
        .location-section {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(139, 123, 107, 0.15);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            grid-column: span 2;
        }

        .location-buttons {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            justify-content: center;
        }

        .location-btn {
            background: #8b7b6b;
            color: #f5f1eb;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 150px;
        }

        .location-btn.secondary {
            background: rgba(139, 123, 107, 0.2);
            color: #8b7b6b;
        }

        .location-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(139, 123, 107, 0.3);
        }

        .location-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Find button */
        .find-btn {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            background: #8b7b6b;
            color: #f5f1eb;
            border: none;
            padding: 20px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            display: block;
        }

        .find-btn:hover {
            background: #756659;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(139, 123, 107, 0.3);
        }

        .find-btn:disabled {
            background: #a69688;
            cursor: not-allowed;
            transform: none;
        }

        /* Results section */
        .result-container {
            display: none;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(139, 123, 107, 0.2);
            border-radius: 20px;
            padding: 40px;
            margin: 40px auto;
            max-width: 600px;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .result-icon {
            width: 50px;
            height: 50px;
            background: rgba(139, 123, 107, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .result-title {
            font-family: 'Crimson Text', serif;
            font-size: 1.8rem;
            color: #3a3330;
        }

        .result-details {
            font-size: 16px;
            line-height: 1.6;
            color: #5a524c;
            text-align: center;
        }

        .result-meta {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(139, 123, 107, 0.1);
            font-size: 14px;
            color: #8b7b6b;
            text-align: center;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .desktop-container {
                padding: 0 20px;
            }
            
            .splash-screen {
                padding: 40px 20px;
            }
            
            .app-title {
                font-size: 3rem;
            }
            
            .main-screen {
                padding: 40px 20px;
            }
            
            .form-cards {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .location-section {
                grid-column: span 1;
            }
            
            .location-buttons {
                flex-direction: column;
                gap: 10px;
            }
            
            .location-btn {
                width: 100%;
            }
            
            .reveal-screen {
                padding: 40px 20px;
                min-height: 100vh;
            }
            
            .restaurant-name {
                font-size: 2.5rem;
                padding: 20px 15px;
                letter-spacing: 1px;
            }
            
            .restaurant-card {
                padding: 30px 20px;
            }
            
            .action-buttons {
                flex-direction: column;
                gap: 15px;
            }
            
            .neon-btn {
                width: 100%;
                max-width: 250px;
            }
        }

        /* Loading state */
        .loading {
            opacity: 0.7;
            pointer-events: none;
        }

        /* Success states */
        .success-input {
            background: rgba(212, 237, 218, 0.3) !important;
            border-color: rgba(40, 167, 69, 0.3) !important;
        }

        /* Question Mark Page */
        .question-screen {
            display: none;
            padding: 80px 60px;
            text-align: center;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            max-width: 800px;
            margin: 0 auto;
        }

        .question-mark {
            font-size: 15rem;
            color: #8b7b6b;
            margin-bottom: 40px;
            animation: pulse 2s infinite;
            opacity: 0.8;
        }

        .mystery-title {
            font-family: 'Crimson Text', serif;
            font-size: 2.5rem;
            color: #3a3330;
            margin-bottom: 20px;
            font-style: italic;
        }

        .reveal-screen .mystery-title {
            color: #8b7b6b;
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-shadow: none;
            position: relative;
            z-index: 1;
        }

        .mystery-subtitle {
            font-size: 16px;
            color: #8b7b6b;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 40px;
        }

        .loading-dots {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: #8b7b6b;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        .dot:nth-child(3) { animation-delay: 0s; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        @keyframes bounce {
            0%, 80%, 100% { 
                transform: scale(0);
            } 40% { 
                transform: scale(1);
            }
        }

        /* Reveal Animation */
        .reveal-screen {
            display: none;
            padding: 80px 60px;
            text-align: center;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            background: #f5f1eb;
            color: #3a3330;
            position: relative;
            box-sizing: border-box;
        }

        .reveal-animation {
            animation: revealIn 1s ease-out;
        }

        .restaurant-card {
            background: transparent;
            border: none;
            padding: 40px 30px;
            margin: 20px auto;
            max-width: 800px;
            width: 100%;
            opacity: 1;
            transform: translateY(0);
            position: relative;
            z-index: 1;
        }

        .restaurant-card.reveal-animation {
            opacity: 0;
            transform: translateY(30px);
            animation: slideUpStay 0.8s ease-out 0.3s forwards;
        }

        .restaurant-name {
            font-family: 'Crimson Text', serif;
            font-size: 3.5rem;
            font-weight: 600;
            color: #3a3330;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.1;
            word-wrap: break-word;
            max-width: 100%;
            border: 3px solid #d4a574;
            padding: 25px 20px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
            box-shadow: 0 8px 32px rgba(139, 123, 107, 0.1);
        }

        .restaurant-details {
            font-size: 18px;
            line-height: 1.8;
            color: #5a524c;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 2px solid #d4a574;
            box-shadow: 0 4px 20px rgba(139, 123, 107, 0.15);
        }

        .restaurant-details strong {
            color: #3a3330;
            font-weight: 600;
        }

        .restaurant-meta {
            font-size: 14px;
            color: #8b7b6b;
            border-top: 1px solid rgba(139, 123, 107, 0.2);
            padding-top: 20px;
            margin-bottom: 40px;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
            position: relative;
            z-index: 2;
        }

        .neon-btn {
            background: transparent;
            color: #d4a574;
            border: 2px solid #d4a574;
            padding: 18px 40px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            min-width: 150px;
        }

        .neon-btn:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 165, 116, 0.2), transparent);
            transition: left 0.5s;
        }

        .neon-btn:hover {
            background: rgba(212, 165, 116, 0.2);
            transform: translateY(-2px);
            border-color: #c49660;
        }

        .neon-btn:hover:before {
            left: 100%;
        }

        .neon-btn.primary {
            background: #d4a574;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(212, 165, 116, 0.3);
        }

        .neon-btn.primary:hover {
            background: #c49660;
            box-shadow: 0 6px 20px rgba(212, 165, 116, 0.4);
            transform: translateY(-3px);
        }

        @keyframes revealIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideUpStay {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="desktop-container">
        <!-- Splash Screen -->
        <div class="splash-screen" id="splashScreen">
            <h1 class="app-title">WHERE2EAT</h1>
            <p class="app-subtitle">Eliminates hassle</p>
            
            <button class="get-started-btn" onclick="showMainScreen()">Get Started</button>
        </div>

        <!-- Main Screen -->
        <div class="main-screen" id="mainScreen">
            <div class="screen-header">
                <h2 class="screen-title">Find Your Perfect Meal</h2>
                <p class="screen-subtitle">Tell us your preferences</p>
            </div>

            <div class="form-cards">
                <div class="form-card">
                    <label class="form-label">Budget Range</label>
                    <div class="form-input">
                        <select id="budget" onchange="updateFormCard(this)">
                            <option value="">Select your budget</option>
                            <option value="$">$ - Under $15</option>
                            <option value="$$">$$ - $15 to $30</option>
                            <option value="$$$">$$$ - $30 to $60</option>
                            <option value="$$$$">$$$$ - $60 and above</option>
                        </select>
                    </div>
                </div>

                <div class="form-card">
                    <label class="form-label">Time Available for Commute</label>
                    <div class="form-input">
                        <select id="time" onchange="updateFormCard(this)">
                            <option value="">How long do you have?</option>
                            <option value="15">15 minutes</option>
                            <option value="30">30 minutes</option>
                            <option value="45">45 minutes</option>
                            <option value="60">1 hour</option>
                            <option value="90">1.5 hours</option>
                            <option value="120">2+ hours</option>
                        </select>
                    </div>
                </div>

                <div class="form-card">
                    <label class="form-label">Transportation</label>
                    <div class="form-input">
                        <select id="transit" onchange="updateFormCard(this)">
                            <option value="">How will you get there?</option>
                            <option value="walking">Walking</option>
                            <option value="biking">Biking</option>
                            <option value="driving">Driving</option>
                            <option value="public_transport">Public Transport</option>
                        </select>
                    </div>
                </div>

                <div class="form-card">
                    <label class="form-label">Cuisine Preference</label>
                    <div class="form-input">
                        <select id="cuisine" onchange="updateFormCard(this)">
                            <option value="">What sounds good?</option>
                            <option value="american">American</option>
                            <option value="italian">Italian</option>
                            <option value="mexican">Mexican</option>
                            <option value="chinese">Chinese</option>
                            <option value="indian">Indian</option>
                            <option value="japanese">Japanese</option>
                            <option value="thai">Thai</option>
                            <option value="mediterranean">Mediterranean</option>
                            <option value="french">French</option>
                            <option value="any">Surprise me</option>
                        </select>
                    </div>
                </div>

                <div class="form-card">
                    <label class="form-label">Dietary Restrictions</label>
                    <div class="form-input">
                        <select id="dietary" onchange="updateFormCard(this)">
                            <option value="">Select dietary needs</option>
                            <option value="none">None</option>
                            <option value="no_beef">No Beef</option>
                            <option value="vegan">Vegan</option>
                            <option value="vegetarian">Vegetarian</option>
                            <option value="gluten_free">Gluten-Free</option>
                            <option value="nut_free">Nut-Free</option>
                            <option value="dairy_free">Dairy-Free</option>
                            <option value="halal">Halal</option>
                            <option value="kosher">Kosher</option>
                        </select>
                    </div>
                </div>

                <div class="location-section">
                    <label class="form-label">Your Location</label>
                    <div class="form-input">
                        <input type="text" id="location" placeholder="We'll help you find your location" readonly />
                    </div>
                    <div class="location-buttons">
                        <button class="location-btn" onclick="getLocation()" id="gps-btn">
                            Use GPS
                        </button>
                        <button class="location-btn secondary" onclick="enableManualEntry()" id="manual-btn">
                            Manual
                        </button>
                    </div>
                </div>
            </div>

            <button class="find-btn" onclick="findRestaurant()" id="findBtn">
                Find My Perfect Restaurant
            </button>

            <div id="result" class="result-container">
                <div class="result-header">
                    <div class="result-icon">🍽️</div>
                    <h3 class="result-title">Perfect Match Found!</h3>
                </div>
                <div id="restaurant-info" class="result-details"></div>
                <div class="result-meta" id="result-meta"></div>
            </div>
        </div>

        <!-- Question Mark Screen -->
        <div class="question-screen" id="questionScreen">
            <div class="question-mark">?</div>
            <h2 class="mystery-title">Finding Your Perfect Match...</h2>
            <p class="mystery-subtitle">Analyzing your preferences and local options</p>
            <div class="loading-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <!-- Reveal Screen -->
        <div class="reveal-screen" id="revealScreen">
            <h2 class="mystery-title">Your Perfect Restaurant Is...</h2>
            <div class="restaurant-card reveal-animation" id="restaurantCard">
                <h3 class="restaurant-name" id="finalRestaurantName">Loading...</h3>
                <div class="restaurant-details" id="finalRestaurantDetails"></div>
                <div class="restaurant-meta" id="finalRestaurantMeta"></div>
            </div>
            <div class="action-buttons">
                <button class="neon-btn" onclick="goBackToSearch()">Back Home</button>
                <button class="neon-btn" onclick="pickAnotherRestaurant()">Pick Another</button>
                <button class="neon-btn" onclick="openGoogleMaps()">Get Directions</button>
                <button class="neon-btn primary" onclick="viewMoreDetails()">View All Options</button>
            </div>
        </div>
    </div>

    <script>
        // Global variables to store current search data
        let currentPreferences = {};
        let allAvailableRestaurants = [];
        let currentRestaurantIndex = 0;
        let shownRestaurantNames = [];  // Track restaurants we've already shown
        let currentRestaurant = null;  // Store current restaurant data for Google Maps
        
        // Show main screen after splash
        function showMainScreen() {
            document.getElementById('splashScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
            
            // Auto-prompt for location after a short delay
            setTimeout(() => {
                if (navigator.geolocation) {
                    if (confirm('WHERE2EAT works best with your location. Allow location access for personalized restaurant recommendations?')) {
                        getLocation();
                    } else {
                        enableManualEntry();
                    }
                } else {
                    enableManualEntry();
                }
            }, 1000);
        }

        // Update form card visual state
        function updateFormCard(element) {
            const card = element.closest('.form-card');
            if (element.value) {
                card.classList.add('active');
            } else {
                card.classList.remove('active');
            }
        }

        function getLocation() {
            if (!navigator.geolocation) {
                alert("Geolocation is not supported by your browser. Please use manual entry.");
                enableManualEntry();
                return;
            }

            const locationBtn = document.getElementById('gps-btn');
            const manualBtn = document.getElementById('manual-btn');
            const locationSection = document.querySelector('.location-section');
            
            locationBtn.textContent = '📍 Getting Location...';
            locationBtn.disabled = true;
            manualBtn.disabled = true;
            locationSection.classList.add('loading');

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    // Set location immediately in the input field
                    const locationInput = document.getElementById('location');
                    if (!locationInput) {
                        console.error('Location input field not found!');
                        return;
                    }
                    
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const locationValue = `Current Location (${lat.toFixed(4)}, ${lon.toFixed(4)})`;
                    
                    // Remove readonly temporarily to set value
                    locationInput.removeAttribute('readonly');
                    locationInput.value = locationValue;
                    // Set back to readonly to prevent manual editing
                    locationInput.setAttribute('readonly', 'readonly');
                    
                    // Visual feedback
                    locationInput.classList.add('success-input');
                    locationSection.classList.add('active');
                    
                    // Force a visual update
                    locationInput.style.color = '#3a3330';
                    locationInput.style.backgroundColor = 'rgba(212, 237, 218, 0.3)';
                    
                    console.log('Location set in input field:', locationValue);
                    console.log('Input field value after setting:', locationInput.value);
                    console.log('Input field element:', locationInput);
                    
                    // Verify the value was set
                    if (locationInput.value !== locationValue) {
                        console.error('Failed to set location value!');
                        // Try alternative method
                        locationInput.removeAttribute('readonly');
                        setTimeout(() => {
                            locationInput.value = locationValue;
                            locationInput.setAttribute('readonly', 'readonly');
                        }, 100);
                    }
                    
                    // Send to server in background (non-blocking)
                    fetch("/location", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            latitude: lat,
                            longitude: lon,
                            accuracy: position.coords.accuracy
                        })
                    })
                    .then(response => response.json())
                    .then(data => {
                        console.log('Location sent to server successfully:', data);
                        locationBtn.textContent = '✅ Location Set';
                        setTimeout(() => {
                            locationBtn.textContent = '📍 Use GPS';
                            locationBtn.disabled = false;
                            manualBtn.disabled = false;
                            locationSection.classList.remove('loading');
                        }, 2000);
                    })
                    .catch(error => {
                        console.error('Error sending location to server (non-critical):', error);
                        // Location is already set in the field, so just update button
                        locationBtn.textContent = 'Location Set';
                        setTimeout(() => {
                            locationBtn.textContent = 'Use GPS';
                            locationBtn.disabled = false;
                            manualBtn.disabled = false;
                            locationSection.classList.remove('loading');
                        }, 2000);
                        showNotification('Location captured');
                    });
                },
                (error) => {
                    locationBtn.textContent = '📍 Use GPS';
                    locationBtn.disabled = false;
                    manualBtn.disabled = false;
                    locationSection.classList.remove('loading');
                    
                    let errorMessage = "Location access unavailable. ";
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            errorMessage += "Please allow location access or use manual entry.";
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMessage += "Location information unavailable.";
                            break;
                        case error.TIMEOUT:
                            errorMessage += "Location request timed out.";
                            break;
                    }
                    
                    showNotification(errorMessage);
                    enableManualEntry();
                }
            );
        }

        function enableManualEntry() {
            const locationInput = document.getElementById('location');
            const locationSection = document.querySelector('.location-section');
            
            locationInput.readOnly = false;
            locationInput.placeholder = 'Enter ZIP code or address (e.g., 90210)';
            locationInput.classList.remove('success-input');
            locationSection.classList.add('active');
            
            // Clear the field if it has GPS coordinates, so user can type fresh
            if (locationInput.value.includes('📍')) {
                locationInput.value = '';
            }
            
            locationInput.focus();
            console.log('Manual entry enabled, input field is now editable');
            
            const manualBtn = document.getElementById('manual-btn');
            manualBtn.textContent = '✏️ Active';
            manualBtn.style.background = '#8b7b6b';
            manualBtn.style.color = '#f5f1eb';
        }

        function findRestaurant() {
            const budget = document.getElementById('budget').value;
            const time = document.getElementById('time').value;
            const transit = document.getElementById('transit').value;
            const cuisine = document.getElementById('cuisine').value;
            const dietary = document.getElementById('dietary').value;
            const location = document.getElementById('location').value;

            console.log('Form values:', { budget, time, transit, cuisine, dietary, location });

            if (!budget || !time || !transit || !cuisine || !location) {
                const missingFields = [];
                if (!budget) missingFields.push('Budget');
                if (!time) missingFields.push('Time');
                if (!transit) missingFields.push('Transportation');
                if (!cuisine) missingFields.push('Cuisine');
                if (!location) missingFields.push('Location');
                showNotification(`Please fill in: ${missingFields.join(', ')}`);
                return;
            }

            // Hide main screen and show question mark screen
            document.getElementById('mainScreen').style.display = 'none';
            document.getElementById('questionScreen').style.display = 'flex';

            const preferences = {
                budget: budget,
                time: time,
                transit: transit,
                cuisine: cuisine,
                dietary: dietary || 'none',
                location: location
            };
            
            // Store preferences globally for "Pick Another" functionality
            currentPreferences = preferences;
            // Reset shown restaurants when starting a new search
            shownRestaurantNames = [];

            console.log('Starting restaurant search with preferences:', preferences);

            // Add suspense delay before making the API call
            setTimeout(() => {
                fetch("/find-restaurant", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(preferences)
                })
                .then(response => {
                    console.log('API response received:', response.status);
                    return response.json();
                })
                .then(data => {
                    console.log('API data received:', data);
                    // Add another delay before reveal
                    setTimeout(() => {
                        showRestaurantReveal(data, preferences);
                    }, 1500);
                })
                .catch(error => {
                    console.error('API Error:', error);
                    // Create fallback data for demo purposes
                    const fallbackData = {
                        status: 'success',
                        restaurant: {
                            name: 'Demo Restaurant',
                            cuisine: 'American',
                            address: '123 Main St',
                            price_range: budget
                        }
                    };
                    setTimeout(() => {
                        showRestaurantReveal(fallbackData, preferences);
                    }, 1500);
                });
            }, 2000); // Initial suspense delay
        }

        function showRestaurantReveal(data, preferences) {
            console.log('Showing restaurant reveal with data:', data);
            
            // Store all restaurants data if available
            if (data.all_restaurants && data.all_restaurants.length > 0) {
                allAvailableRestaurants = data.all_restaurants;
            } else if (data.restaurant) {
                // If only one restaurant, store it in array format
                allAvailableRestaurants = [data.restaurant];
            } else {
                allAvailableRestaurants = [];
            }
            
            // Hide question screen and show reveal screen
            document.getElementById('questionScreen').style.display = 'none';
            const revealScreen = document.getElementById('revealScreen');
            revealScreen.style.display = 'flex';
            
            const restaurantName = document.getElementById('finalRestaurantName');
            const restaurantDetails = document.getElementById('finalRestaurantDetails');
            const restaurantMeta = document.getElementById('finalRestaurantMeta');
            const restaurantCard = document.getElementById('restaurantCard');
            
            // Remove any existing animation class and add it back
            restaurantCard.classList.remove('reveal-animation');
            
            if (data.status === 'success' && data.restaurant) {
                const restaurant = data.restaurant;
                console.log('Restaurant data:', restaurant);
                
                // Store current restaurant globally for Google Maps
                currentRestaurant = restaurant;
                
                // Track this restaurant as shown
                if (restaurant.name && !shownRestaurantNames.includes(restaurant.name)) {
                    shownRestaurantNames.push(restaurant.name);
                }
                
                // Set restaurant name immediately
                restaurantName.textContent = restaurant.name || 'Mystery Restaurant';
                restaurantName.style.opacity = '1';
                
                restaurantDetails.innerHTML = `
                    <div style="margin-bottom: 20px;">
                        <strong>Cuisine:</strong> ${restaurant.cuisine || 'Mixed'}
                    </div>
                    <div style="margin-bottom: 20px;">
                        <strong>Location:</strong> ${restaurant.address || 'Address not available'}
                    </div>
                    <div>
                        <strong>Price Range:</strong> ${restaurant.price_range || preferences.budget}
                    </div>
                `;
                
                restaurantMeta.innerHTML = `
                    Your preferences: ${preferences.budget} budget • ${preferences.time} min available • ${preferences.transit} • ${preferences.cuisine} cuisine
                `;
            } else {
                restaurantName.textContent = 'Sorry!';
                restaurantDetails.innerHTML = `
                    <div style="color: #8b7b6b; text-align: center; padding: 20px 0;">
                        ${data.message || 'No restaurants found matching your criteria.'}
                    </div>
                `;
                restaurantMeta.innerHTML = '';
            }
            
            // Add animation class after a small delay to trigger animation
            setTimeout(() => {
                restaurantCard.classList.add('reveal-animation');
            }, 100);
        }

        function showErrorReveal() {
            console.log('Showing error reveal');
            
            document.getElementById('questionScreen').style.display = 'none';
            const revealScreen = document.getElementById('revealScreen');
            revealScreen.style.display = 'flex';
            
            const restaurantName = document.getElementById('finalRestaurantName');
            const restaurantDetails = document.getElementById('finalRestaurantDetails');
            const restaurantMeta = document.getElementById('finalRestaurantMeta');
            
            restaurantName.textContent = 'Connection Error';
            restaurantName.style.opacity = '1';
            
            restaurantDetails.innerHTML = `
                <div style="color: #8b7b6b; text-align: center; padding: 20px 0;">
                    Unable to search restaurants. Please check your connection and try again.
                </div>
            `;
            restaurantMeta.innerHTML = '';
        }

        function goBackToSearch() {
            document.getElementById('revealScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
        }
        
        function openGoogleMaps() {
            if (!currentRestaurant) {
                showNotification('No restaurant selected');
                return;
            }
            
            let mapsUrl = '';
            
            // Check if we have coordinates (preferred method)
            if (currentRestaurant.coordinates && currentRestaurant.coordinates.lat && currentRestaurant.coordinates.lon) {
                const lat = currentRestaurant.coordinates.lat;
                const lon = currentRestaurant.coordinates.lon;
                // Google Maps directions URL with coordinates
                mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`;
            } 
            // Fallback to address if coordinates not available
            else if (currentRestaurant.address) {
                const address = encodeURIComponent(currentRestaurant.address);
                // Google Maps directions URL with address
                mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${address}`;
            }
            // Fallback to restaurant name if address not available
            else if (currentRestaurant.name) {
                const name = encodeURIComponent(currentRestaurant.name);
                mapsUrl = `https://www.google.com/maps/search/?api=1&query=${name}`;
            }
            
            if (mapsUrl) {
                console.log('Opening Google Maps:', mapsUrl);
                window.open(mapsUrl, '_blank');
            } else {
                showNotification('Location information not available for this restaurant');
            }
        }
        
        function pickAnotherRestaurant() {
            showNotification('Finding another great option...');
            // Fetch a new restaurant excluding ones we've already shown
            searchWithCurrentPreferences(false, shownRestaurantNames);
        }
        
        function showAllRestaurants() {
            if (allAvailableRestaurants.length > 1) {
                displayRestaurantList();
            } else {
                showNotification('Finding all available options...');
                // Fetch all restaurants and then display list
                searchWithCurrentPreferences(true);
            }
        }
        
        function searchWithCurrentPreferences(fetchAll = false, excludeNames = []) {
            // Show loading state
            document.getElementById('questionScreen').style.display = 'flex';
            document.getElementById('revealScreen').style.display = 'none';
            
            // Add parameter to request all restaurants
            const requestData = { ...currentPreferences };
            if (fetchAll) {
                requestData.get_all = true;
            }
            // Add exclude list to avoid showing same restaurants
            if (excludeNames && excludeNames.length > 0) {
                requestData.exclude_restaurants = excludeNames;
            }
            
            setTimeout(() => {
                fetch("/find-restaurant", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(requestData)
                })
                .then(response => response.json())
                .then(data => {
                    console.log('API Response:', data);
                    setTimeout(() => {
                        if (fetchAll && data.all_restaurants) {
                            console.log(`Received ${data.all_restaurants.length} restaurants for 'View All'`);
                            allAvailableRestaurants = data.all_restaurants;
                            if (allAvailableRestaurants.length === 0) {
                                showNotification('No restaurants found. Try adjusting your search criteria.');
                                document.getElementById('questionScreen').style.display = 'none';
                                document.getElementById('revealScreen').style.display = 'flex';
                            } else {
                                displayRestaurantList();
                            }
                        } else {
                            showRestaurantReveal(data, currentPreferences);
                        }
                    }, 1500);
                })
                .catch(error => {
                    console.error('API Error:', error);
                    showNotification('Unable to find more restaurants. Please try a different search.');
                    setTimeout(() => {
                        document.getElementById('questionScreen').style.display = 'none';
                        document.getElementById('revealScreen').style.display = 'flex';
                    }, 2000);
                });
            }, 1000);
        }
        
        function displaySingleRestaurant(restaurant) {
            // Store current restaurant for Google Maps
            currentRestaurant = restaurant;
            
            const restaurantName = document.getElementById('finalRestaurantName');
            const restaurantDetails = document.getElementById('finalRestaurantDetails');
            const restaurantMeta = document.getElementById('finalRestaurantMeta');
            
            restaurantName.textContent = restaurant.name || 'Mystery Restaurant';
            
            restaurantDetails.innerHTML = `
                <p><strong>Cuisine:</strong> ${restaurant.cuisine || 'Various'}</p>
                <p><strong>Address:</strong> ${restaurant.address || 'Address not available'}</p>
                <p><strong>Price Range:</strong> ${restaurant.price_range || 'Not specified'}</p>
                ${restaurant.travel_time ? `<p><strong>Travel Time:</strong> ${restaurant.travel_time}</p>` : ''}
            `;
            
            restaurantMeta.innerHTML = `
                <small>✨ Selected just for you based on your preferences</small>
            `;
        }
        
        function displayRestaurantList() {
            document.getElementById('questionScreen').style.display = 'none';
            document.getElementById('revealScreen').style.display = 'none';
            
            // Create and show restaurant list modal
            const listModal = document.createElement('div');
            listModal.id = 'restaurantListModal';
            listModal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.8);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 1000;
            `;
            
            const listContent = document.createElement('div');
            listContent.style.cssText = `
                background: #f5f1eb;
                border-radius: 20px;
                padding: 40px;
                max-width: 80%;
                max-height: 80%;
                overflow-y: auto;
                box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            `;
            
            let listHTML = `
                <h2 style="color: #3a3330; margin-bottom: 10px; text-align: center; font-family: 'Crimson Text', serif;">All Available Restaurants</h2>
                <p style="color: #8b7b6b; text-align: center; margin-bottom: 30px; font-size: 14px;">Found ${allAvailableRestaurants.length} restaurant${allAvailableRestaurants.length !== 1 ? 's' : ''}</p>
                <div style="display: grid; gap: 20px;">
            `;
            
            console.log(`Displaying ${allAvailableRestaurants.length} restaurants in list`);
            allAvailableRestaurants.forEach((restaurant, index) => {
                listHTML += `
                    <div style="
                        background: rgba(255,255,255,0.9);
                        border: 2px solid #d4a574;
                        border-radius: 15px;
                        padding: 20px;
                        cursor: pointer;
                        transition: all 0.3s ease;
                    " onclick="selectRestaurantFromList(${index})" onmouseover="this.style.background='rgba(212,165,116,0.1)'" onmouseout="this.style.background='rgba(255,255,255,0.9)'">
                        <h3 style="color: #3a3330; margin-bottom: 10px;">${restaurant.name}</h3>
                        <p style="color: #5a524c; margin-bottom: 5px;"><strong>Cuisine:</strong> ${restaurant.cuisine || 'Various'}</p>
                        <p style="color: #5a524c; margin-bottom: 5px;"><strong>Address:</strong> ${restaurant.address || 'Address not available'}</p>
                        <p style="color: #5a524c;"><strong>Price:</strong> ${restaurant.price_range || 'Not specified'}</p>
                    </div>
                `;
            });
            
            listHTML += `
                </div>
                <div style="text-align: center; margin-top: 30px;">
                    <button onclick="closeRestaurantList()" style="
                        background: #d4a574;
                        color: white;
                        border: none;
                        padding: 15px 30px;
                        border-radius: 10px;
                        font-size: 16px;
                        cursor: pointer;
                        transition: all 0.3s ease;
                    " onmouseover="this.style.background='#c49660'" onmouseout="this.style.background='#d4a574'">Close</button>
                </div>
            `;
            
            listContent.innerHTML = listHTML;
            listModal.appendChild(listContent);
            document.body.appendChild(listModal);
        }
        
        function selectRestaurantFromList(index) {
            const selectedRestaurant = allAvailableRestaurants[index];
            closeRestaurantList();
            document.getElementById('revealScreen').style.display = 'flex';
            displaySingleRestaurant(selectedRestaurant);
            showNotification(`Great choice! ${selectedRestaurant.name} it is!`);
        }
        
        function closeRestaurantList() {
            const modal = document.getElementById('restaurantListModal');
            if (modal) {
                modal.remove();
            }
            document.getElementById('revealScreen').style.display = 'flex';
        }
        
        function viewMoreDetails() {
            // Always fetch all restaurants to show complete list (don't exclude any)
            showNotification('Finding all available options...');
            searchWithCurrentPreferences(true, []);  // Pass empty array to not exclude any restaurants
        }

        function showNotification(message) {
            // Create a toast notification
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 80px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(58, 51, 48, 0.9);
                color: #f5f1eb;
                padding: 12px 20px;
                border-radius: 20px;
                font-size: 14px;
                z-index: 1000;
                animation: slideDown 0.3s ease;
                backdrop-filter: blur(10px);
                max-width: 320px;
                text-align: center;
            `;
            
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideUp 0.3s ease forwards';
                setTimeout(() => document.body.removeChild(notification), 300);
            }, 3000);
        }

        // Add slide animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideDown {
                from { transform: translateX(-50%) translateY(-100%); opacity: 0; }
                to { transform: translateX(-50%) translateY(0); opacity: 1; }
            }
            @keyframes slideUp {
                from { transform: translateX(-50%) translateY(0); opacity: 1; }
                to { transform: translateX(-50%) translateY(-100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // Add form interaction handlers
        document.addEventListener('DOMContentLoaded', function() {
            const selects = document.querySelectorAll('select');
            selects.forEach(select => {
                select.addEventListener('change', function() {
                    updateFormCard(this);
                });
            });
        });
    </script>
</body>
</html>
